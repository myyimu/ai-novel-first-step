services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novel}
      POSTGRES_DB: ${POSTGRES_DB:-ai_novel_first_step}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: postgres://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD:-novel}@postgres:5432/${POSTGRES_DB:-ai_novel_first_step}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      SHARED_GPU_BASE_URL: ${SHARED_GPU_BASE_URL:-}
      SHARED_GPU_MODEL: ${SHARED_GPU_MODEL:-}
      SHARED_GPU_API_KEY: ${SHARED_GPU_API_KEY:-}
      SHARED_GPU_JSON_MODE: ${SHARED_GPU_JSON_MODE:-false}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3001') + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:3001/api/v1}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres_data:

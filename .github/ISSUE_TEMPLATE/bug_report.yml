name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not paste API keys, uploaded novel full text, private prompts, or model outputs that you do not have the right to share.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Configure ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web UI
        - API
        - Model provider
        - TXT upload / chapter splitting
        - Async job / partial result
        - Map-Reduce book analysis
        - Export center
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: e.g. d6fcc03
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node.js version, pnpm version, browser, model provider
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets and private text before posting.
      render: text

# Generated by One CLI
name: CI - ai-core

on:
  pull_request:
    paths:
      - 'packages/ai-core/**'
      - '.github/workflows/ci-packages-ai-core.yml'
  push:
    paths:
      - 'packages/ai-core/**'
      - '.github/workflows/ci-packages-ai-core.yml'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run pnpm run check
        run: pnpm --filter @ai-novel-first-step/ai-core check
      - name: Run pnpm run test
        run: pnpm --filter @ai-novel-first-step/ai-core test
      - name: Run pnpm run build
        run: pnpm --filter @ai-novel-first-step/ai-core build
